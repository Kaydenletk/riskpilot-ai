name: Bug report
description: Something is broken or behaving wrong
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you see? What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. make dev
        2. open ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - risk_engine (math)
        - number_guardrail (LLM reliability)
        - frontend / dashboard
        - deploy / DX (make, docker, env)
        - other
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Python version (make doctor output), Node version, DEMO_MODE on/off"
