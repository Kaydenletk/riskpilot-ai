name: Feature request / idea
description: Suggest an improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What would you like, and what problem does it solve?
    validations:
      required: true
  - type: checkboxes
    id: thesis
    attributes:
      label: Fits the project's constraints
      description: RiskPilot keeps math deterministic and never gives investment advice.
      options:
        - label: This keeps risk_engine LLM-free (numbers stay deterministic)
        - label: This does not add buy/sell recommendations (risk coaching only)
  - type: textarea
    id: notes
    attributes:
      label: Anything else
