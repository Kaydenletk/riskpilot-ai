name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Test (no OpenAI key — DEMO_MODE)
        working-directory: backend
        run: pytest -q
      - name: Eval (reliability, runs on fixtures)
        working-directory: backend
        run: python -m riskpilot.eval.run

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Build
        working-directory: frontend
        run: npm run build
